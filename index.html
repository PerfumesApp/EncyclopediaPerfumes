<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- قطع الشبكة الصلب (A 1.809): سياسة أمن محتوى تحصر كل المصادر في أصل
         التطبيق المحلي فقط (و data:/blob: للصور المولدة و التصدير). أي طلب
         خارجي — حتى من رابط صورة محفوظ داخل سجل (image_url/logo_url/media) —
         يحجبه الـWebView نفسه قبل أن يلمس الشبكة. لا استثناء لأي نطاق. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' data: blob:; connect-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#9a7b1f" />
    <title>موسوعة Encyclopedia</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="موسوعة" />
    <meta name="apple-mobile-web-app-title" content="موسوعة" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root">
      <!-- Instant boot splash: static HTML shown on first paint (no JS needed),
           replaced automatically when React mounts. Kills the blank-white wait. -->
      <div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#fafaf9 0%,#f5f5f4 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;padding:24px;">
        <div style="font-size:24px;font-weight:700;letter-spacing:-0.02em;text-align:center;background:linear-gradient(135deg,#9a7b1f,#c8a02e);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">موسوعة Encyclopedia</div>
        <div style="margin-top:18px;width:26px;height:26px;border:3px solid #e7e5e4;border-top-color:#9a7b1f;border-radius:50%;animation:bootspin .8s linear infinite;"></div>
        <div style="margin-top:14px;font-size:10px;color:#a8a29e;letter-spacing:.02em;text-align:center;">Waiting Has Value  للإنتظار قيمة</div>
      </div>
      <style>@keyframes bootspin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
